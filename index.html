<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ REQUIRED FOR BASE -->
<meta name="base:app_id" content="69d8a85f34c69936dc95d6d0">

<title>Base Wallet Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter;
  background:#05070c;
  color:#fff;
  display:flex;
}
.sidebar {
  width:220px;
  background:#0b1220;
  padding:20px;
  height:100vh;
}
.sidebar div {
  padding:10px;
  cursor:pointer;
}
.main {
  flex:1;
  padding:20px;
}
.card {
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}
button {
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#3b82f6;
  color:white;
  cursor:pointer;
}
input {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#1e293b;
  color:white;
}
.tx { border-bottom:1px solid #1f2937; padding:8px; }
</style>
</head>

<body>

<div class="sidebar">
  <h3 style="color:#3b82f6;">Base</h3>
  <div onclick="show('dashboard')">Dashboard</div>
  <div onclick="show('send')">Send</div>
  <div onclick="show('swap')">Swap</div>
  <div onclick="show('bridge')">Bridge</div>
  <div onclick="show('activity')">Activity</div>
</div>

<div class="main">

<h2>Base Wallet</h2>
<button onclick="connect()">Connect Wallet</button>

<div class="card">
  <p>Wallet: <span id="wallet">Not connected</span></p>
  <p>ETH: <span id="eth">--</span></p>
  <p>USDC: <span id="usdc">--</span></p>
</div>

<!-- SEND -->
<div class="card section" id="send">
  <h3>Send</h3>
  <input id="to" placeholder="Address">
  <input id="amount" placeholder="Amount">
  <button onclick="sendETH()">Send ETH</button>
  <button onclick="sendUSDC()">Send USDC</button>
</div>

<!-- SWAP -->
<div class="card section" id="swap">
  <h3>Swap (Basic)</h3>
  <button onclick="swap()">Swap ETH → USDC</button>
</div>

<!-- BRIDGE -->
<div class="card section" id="bridge">
  <h3>Bridge Quote</h3>
  <button onclick="bridge()">Get Quote</button>
  <pre id="bridgeResult"></pre>
</div>

<!-- ACTIVITY -->
<div class="card section" id="activity">
  <h3>Activity</h3>
  <div id="txs"></div>
</div>

</div>

<script>
let user;
const USDC="0xd9aaec86b65d86f6a7b5c1c42ffa531710b6cae9";

// NAV
function show(id){
  document.querySelectorAll('.section').forEach(e=>e.style.display='none');
  document.getElementById(id).style.display='block';
}
show('send');

// CONNECT
async function connect(){
  const acc = await ethereum.request({method:"eth_requestAccounts"});
  user = acc[0];
  document.getElementById("wallet").innerText = user;
  load();
}

// LOAD BALANCES
async function load(){
  const eth = await ethereum.request({
    method:"eth_getBalance",
    params:[user,"latest"]
  });
  document.getElementById("eth").innerText = (parseInt(eth,16)/1e18).toFixed(4);

  const data="0x70a08231"+user.slice(2).padStart(64,"0");

  const usdc=await ethereum.request({
    method:"eth_call",
    params:[{to:USDC,data},"latest"]
  });

  document.getElementById("usdc").innerText = (parseInt(usdc,16)/1e6).toFixed(2);
}

// SEND ETH
async function sendETH(){
  const to=document.getElementById("to").value;
  const amt=document.getElementById("amount").value;

  await ethereum.request({
    method:"eth_sendTransaction",
    params:[{
      from:user,
      to,
      value:(Number(amt)*1e18).toString(16)
    }]
  });

  addTx("Sent ETH");
}

// SEND USDC
async function sendUSDC(){
  const to=document.getElementById("to").value;
  const amt=document.getElementById("amount").value;

  const value=(Number(amt)*1e6).toString(16).padStart(64,"0");

  const data="0xa9059cbb"+to.slice(2).padStart(64,"0")+value;

  await ethereum.request({
    method:"eth_sendTransaction",
    params:[{from:user,to:USDC,data}]
  });

  addTx("Sent USDC");
}

// SWAP (basic placeholder)
async function swap(){
  alert("Swap requires router params (use production version for full swap)");
}

// BRIDGE (LI.FI API)
async function bridge(){
  const res = await fetch("https://li.quest/v1/quote?fromChain=1&toChain=8453&fromToken=ETH&toToken=ETH&fromAmount=1000000000000000");
  const data = await res.json();
  document.getElementById("bridgeResult").innerText = JSON.stringify(data,null,2);
}

// ACTIVITY
function addTx(t){
  const div=document.createElement("div");
  div.className="tx";
  div.innerText=t;
  document.getElementById("txs").prepend(div);
}
</script>

</body>
</html>
