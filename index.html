<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="base:app_id" content="69d8a85f34c69936dc95d6d0" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>


  <title>Base Wallet</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0a0b0f;
      color: #fff;
    }
    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }
    .card {
      background: #111318;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 15px;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 8px;
      background: #1f2937;
      color: white;
    }
    button {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      margin-top: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .primary { background: #3b82f6; color: white; }
    .secondary { background: #1f2937; color: white; }
    .label { font-size: 13px; color: #9ca3af; }
  </style>
</head>

<body>
<div class="container">

  <h2>💳 Base Wallet</h2>

  <div class="card">
    <div class="label">Wallet</div>
    <div id="wallet">Not connected</div>

    <div class="label" style="margin-top:10px;">ETH Balance</div>
    <div id="eth">--</div>

    <div class="label" style="margin-top:10px;">USDC Balance</div>
    <div id="usdc">--</div>
  </div>

  <button class="primary" onclick="connect()">Connect Wallet</button>
  <button class="secondary" onclick="switchBase()">Switch to Base</button>

  <div class="card">
    <div class="label">Send USDC</div>

    <input id="to" placeholder="Recipient address" />
    <input id="amount" placeholder="Amount (USDC)" />

    <button class="primary" onclick="sendUSDC()">Send USDC</button>
  </div>

</div>

<script>
let user = null;

// Base USDC contract
const USDC = "0xd9aaec86b65d86f6a7b5c1c42ffa531710b6cae9";

// Connect
async function connect() {
  const acc = await ethereum.request({ method: "eth_requestAccounts" });
  user = acc[0];
  document.getElementById("wallet").innerText = user;
  loadBalances();
}

// Switch Base
async function switchBase() {
  await ethereum.request({
    method: "wallet_switchEthereumChain",
    params: [{ chainId: "0x2105" }]
  });
}

// Load balances
async function loadBalances() {
  const ethBal = await ethereum.request({
    method: "eth_getBalance",
    params: [user, "latest"]
  });

  document.getElementById("eth").innerText =
    (parseInt(ethBal,16)/1e18).toFixed(4) + " ETH";

  // USDC balance (call ERC20)
  const data = "0x70a08231" + user.slice(2).padStart(64,"0");

  const usdcBal = await ethereum.request({
    method: "eth_call",
    params: [{
      to: USDC,
      data: data
    }, "latest"]
  });

  document.getElementById("usdc").innerText =
    (parseInt(usdcBal,16)/1e6).toFixed(2) + " USDC";
}

// Send USDC
async function sendUSDC() {
  const to = document.getElementById("to").value;
  const amt = document.getElementById("amount").value;

  const amountHex = (Number(amt) * 1e6).toString(16);
  const paddedAmount = amountHex.padStart(64,"0");

  const data =
    "0xa9059cbb" +
    to.slice(2).padStart(64,"0") +
    paddedAmount;

  await ethereum.request({
    method: "eth_sendTransaction",
    params: [{
      from: user,
      to: USDC,
      data: data
    }]
  });

  alert("Transaction sent!");
}
</script>

</body>
</html>
